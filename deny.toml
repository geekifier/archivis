[graph]
all-features = true
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "AGPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
skip = [
    # notify -> kqueue-sys (macOS) still depends on bitflags 1.x
    { crate = "bitflags@1", reason = "transitive: notify -> kqueue-sys (macOS only)" },
    # whatlang pins hashbrown 0.14; sqlx/hashlink pins 0.15; indexmap uses 0.16
    { crate = "hashbrown@0.14", reason = "transitive: whatlang" },
    { crate = "hashbrown@0.15", reason = "transitive: sqlx -> hashlink" },
    # argon2 -> rand 0.8 -> getrandom 0.2; newer deps use 0.4
    { crate = "getrandom@0.2", reason = "transitive: argon2 -> rand 0.8" },
    # archivis-formats pins zip 2.x; utoipa-swagger-ui build dep uses 3.x
    { crate = "zip@2", reason = "archivis-formats vs utoipa-swagger-ui build dep" },
    # resvg: fontconfig-parser uses roxmltree 0.20, usvg uses 0.21
    { crate = "roxmltree@0.20", reason = "transitive: resvg -> fontconfig-parser vs usvg" },
    # Deep transitive Windows platform crates (multiple consumers pin different versions)
    { crate = "windows-sys@0.52", reason = "deep transitive Windows platform crate" },
    { crate = "windows-sys@0.60", reason = "deep transitive Windows platform crate" },
    { crate = "windows-targets@0.52", reason = "deep transitive Windows platform crate" },
]
skip-tree = [
    # Skip all duplicates within the windows-targets tree (arch-specific sub-crates)
    { crate = "windows-targets@0.52" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/geekifier/mobi-book"]
