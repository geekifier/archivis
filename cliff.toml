# git-cliff configuration — https://git-cliff.org
# Generates changelogs from conventional commits.

[changelog]
header = """
# Changelog

All notable changes to Archivis are documented here.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/geekifier/archivis
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}]\
        {%- if release_link -%}
            ({{ self::remote_url() }}/releases/tag/{{ version }})
        {%- endif %} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {% if commit.breaking %}[**BREAKING**] {% endif %}\
            {{ commit.message | upper_first }}\
            {%- if commit.links %} \
                ({{ commit.links | join(sep=", ") }})\
            {%- endif %}
    {%- endfor %}
{% endfor %}\n
"""
footer = """
{%- macro remote_url() -%}
  https://github.com/geekifier/archivis
{%- endmacro -%}

{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous and release.previous.version -%}
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                {{ self::remote_url() }}/compare/{{ release.previous.version }}...{{ release.version }}
        {% endif -%}
    {% else -%}
        {% if release.previous and release.previous.version -%}
            [Unreleased]: {{ self::remote_url() }}/compare/{{ release.previous.version }}...HEAD
        {% endif -%}
    {% endif -%}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^doc", group = "<!-- 3 -->Documentation" },
    { message = "^refactor", group = "<!-- 4 -->Refactoring" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    # Filter out noise
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(ci\\)", skip = true },
    { message = "^chore\\(ai\\)", skip = true },
    { message = "^chore", group = "<!-- 6 -->Miscellaneous" },
    { message = "^style", group = "<!-- 6 -->Miscellaneous" },
    { message = "^build", group = "<!-- 6 -->Miscellaneous" },
]

link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/geekifier/archivis/issues/$1" },
]
