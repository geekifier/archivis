name: Dev Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build frontend ───────────────────────────────────────────────────────────
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ── Build Linux binaries ─────────────────────────────────────────────────────
  build-binary:
    name: Build linux-${{ matrix.arch }}
    needs: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
            cross: false

          - arch: arm64
            target: aarch64-unknown-linux-musl
            cross: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install musl tools
        if: "!matrix.cross"
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@d6e286fa45544157a02d45a43742857ebbc25d12 # v2
        with:
          tool: cross@0.2.5

      - name: Compute version
        id: version
        run: echo "value=dev+sha.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          ARCHIVIS_VERSION: ${{ steps.version.outputs.value }}
          USE_CROSS: ${{ matrix.cross }}
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$BUILD_TARGET" --package archivis-server
          else
            cargo build --release --target "$BUILD_TARGET" --package archivis-server
          fi

      - name: Prepare binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "dist/${BUILD_ARCH}"
          cp "target/${BUILD_TARGET}/release/archivis" "dist/${BUILD_ARCH}/archivis"
          chmod +x "dist/${BUILD_ARCH}/archivis"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}/archivis
          retention-days: 1

  # ── Build and push Docker image ──────────────────────────────────────────────
  docker:
    name: Docker image
    needs: [frontend, build-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-build
          path: dist/frontend

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-linux-amd64
          path: dist/amd64

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-linux-arm64
          path: dist/arm64

      - name: Fix permissions
        run: chmod +x dist/amd64/archivis dist/arm64/archivis

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-,format=short

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=dev
            REVISION=${{ github.sha }}
