name: Dev Build

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '_docs/**'
      - 'docs/**'
      - 'LICENSE'
      - 'Justfile'
      - 'docker-compose*.yml'
      - 'cliff.toml'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Pinned Rust release. MUST match `rust-toolchain.toml` channel.
  # Pass to every dtolnay/rust-toolchain step so `rustup target add` operates
  # on the same toolchain name that cargo invokes via rust-toolchain.toml.
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # ── CI quality gate ────────────────────────────────────────────────────────
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  # ── Build frontend ───────────────────────────────────────────────────────────
  frontend:
    needs: ci
    name: Build frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  # ── Build Linux binaries ─────────────────────────────────────────────────────
  build-binary:
    name: Build linux-${{ matrix.arch }}
    needs: [ci, frontend]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl

          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Compute version
        id: version
        run: echo "value=dev+sha.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          ARCHIVIS_VERSION: ${{ steps.version.outputs.value }}
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET" --package archivis-server

      - name: Prepare binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "dist/${BUILD_ARCH}"
          cp "target/${BUILD_TARGET}/release/archivis" "dist/${BUILD_ARCH}/archivis"
          chmod +x "dist/${BUILD_ARCH}/archivis"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binary-linux-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}/archivis
          retention-days: 1

  # ── Build and push Docker image ──────────────────────────────────────────────
  docker:
    name: Docker image
    needs: [frontend, build-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: dist/frontend

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-linux-amd64
          path: dist/amd64

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-linux-arm64
          path: dist/arm64

      - name: Fix permissions
        run: chmod +x dist/amd64/archivis dist/arm64/archivis

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-,format=short

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=dev
            REVISION=${{ github.sha }}
